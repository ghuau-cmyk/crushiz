<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sukiss</title>
<style>
  :root{
    --bg:#f3eef0; --moi:#e8567a; --moi-d:#c43d60;
    --txt:#2b2330; --doux:#8a7f86; --bulleApp:#eceaef;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column;}
  header{padding:14px 16px;text-align:center;background:#fff;border-bottom:1px solid #eadfe3;flex:0 0 auto;}
  header h1{margin:0;font-size:1.15rem;color:var(--moi-d);letter-spacing:.5px;}
  header .st{font-size:.72rem;color:var(--doux);}
  #chat{flex:1 1 auto;overflow-y:auto;padding:18px 14px calc(20px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px;}
  .ligne{display:flex;max-width:84%;}
  .ligne.app{align-self:flex-start;}
  .ligne.moi{align-self:flex-end;}
  .bulle{padding:10px 14px;border-radius:20px;font-size:.98rem;line-height:1.4;animation:pop .25s ease;}
  .app .bulle{background:var(--bulleApp);color:var(--txt);border-bottom-left-radius:6px;}
  .moi .bulle{background:var(--moi);color:#fff;border-bottom-right-radius:6px;}
  @keyframes pop{from{opacity:0;transform:translateY(6px) scale(.98);}to{opacity:1;transform:none;}}
  .secret{font-family:ui-monospace,Menlo,Consolas,monospace;letter-spacing:1px;background:#fff;border:1.5px dashed var(--moi);color:var(--moi-d);border-radius:10px;padding:9px 12px;margin-top:6px;text-align:center;font-size:1.05rem;word-break:break-all;}
  /* indicateur "en train d'ecrire" */
  .typing .bulle{display:flex;gap:4px;align-items:center;}
  .typing .pt{width:7px;height:7px;border-radius:50%;background:#b9adb4;animation:bl 1.2s infinite;}
  .typing .pt:nth-child(2){animation-delay:.2s}.typing .pt:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
  /* options INLINE, alignées à droite (côté "moi") */
  .options{align-self:flex-end;display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;max-width:88%;animation:pop .25s ease;}
  .chip{border:1.5px solid var(--moi);color:var(--moi-d);background:#fff;border-radius:999px;padding:9px 16px;font-size:.92rem;font-weight:600;cursor:pointer;transition:.12s;}
  .chip:hover{background:var(--moi);color:#fff;}
  .chip:active{transform:scale(.95);}
</style>
</head>
<body>
<header>
  <h1>Sukiss</h1>
  <div class="st">conversation privée · réponses chiffrées</div>
</header>
<div id="chat"></div>

<script>
const QUESTIONS = [
  { id:'q1',  t:"Pour commencer en douceur 🙂 ton énergie quand tu passes du temps avec quelqu'un, c'est plutôt…",
    o:[['discret','Discrète'],['tranquille','Tranquille'],['present','Présente'],['tout_le_temps','À fond']] },
  { id:'q2',  t:"Et côté tendresse, ce qui te fait vibrer en premier ?",
    o:[['tendresse','La tendresse'],['equilibre','Un équilibre'],['physique','Le physique']] },
  { id:'q6',  t:"Quand ça se rapproche, qui aime mener la danse ?",
    o:[['moi','Plutôt moi'],['autre','Plutôt l’autre'],['tour_de_role','Tour de rôle'],['peu_importe','Peu importe']] },
  { id:'q7',  t:"Ton moment idéal pour un moment à deux ?",
    o:[['matin','Le matin'],['apres_midi','L’après-midi'],['soir','Le soir'],['nimporte','N’importe quand']] },
  { id:'q9',  t:"Tu te sens plutôt…",
    o:[['meneur','Du genre à mener'],['suiveur','Du genre à suivre'],['alterner','J’aime alterner']] },
  { id:'q11', t:"Et ton rythme à toi ?",
    o:[['lent','Lent, j’aime prendre le temps'],['depend','Ça dépend'],['direct','Direct']] },
  { id:'b_sens_sensoriel', t:"On explore un peu plus ? La douceur, les sensations tout en lenteur… ça te tente ?",
    o:[['oui','Oui'],['curieux','Curieux·se'],['non','Bof'],['limite','Pas mon truc']] },
  { id:'b_sens_consignes', t:"Donner ou recevoir de petites consignes, ça t’intrigue ?",
    o:[['oui','Oui'],['curieux','Curieux·se'],['non','Bof'],['limite','Pas mon truc']] },
  { id:'b_sens_consignes_dir', t:"Et tu te verrais plutôt…",
    o:[['donner','Donner'],['suivre','Suivre'],['les_deux','Les deux']] },
  { id:'b_sens_fessee', t:"Des sensations un peu plus corsées ?",
    o:[['oui','Oui'],['curieux','Curieux·se'],['non','Bof'],['limite','Pas mon truc']] },
  { id:'b_sens_fessee_dir', t:"Tu t’y verrais plutôt…",
    o:[['actif','Actif·ve'],['receptif','Réceptif·ve'],['les_deux','Les deux']] },
  { id:'b_sens_attache', t:"Dernière : les jeux d’attache, ça te parle ?",
    o:[['oui','Oui'],['curieux','Curieux·se'],['non','Bof'],['limite','Pas mon truc']] },
];

const CLE_STOCK = 'sukiss_reponses';
const chat = document.getElementById('chat');
let reponses = JSON.parse(localStorage.getItem(CLE_STOCK) || '{}');
let idx = 0;

const dodo = (ms)=>new Promise(r=>setTimeout(r,ms));
const scroll = ()=>{ chat.scrollTop = chat.scrollHeight; };

function bulle(cote, html){
  const l = document.createElement('div'); l.className='ligne '+cote;
  const b = document.createElement('div'); b.className='bulle'; b.innerHTML=html;
  l.appendChild(b); chat.appendChild(l); scroll(); return l;
}

async function appDit(html, pause=700){
  const t = document.createElement('div'); t.className='ligne app typing';
  t.innerHTML='<div class="bulle"><span class="pt"></span><span class="pt"></span><span class="pt"></span></div>';
  chat.appendChild(t); scroll();
  await dodo(pause);
  t.remove();
  return bulle('app', html);
}

// Options INLINE, dans le fil, alignées à droite. Au clic : disparaissent et
// laissent place à la bulle "moi".
function montrerOptions(opts, onPick){
  const row = document.createElement('div'); row.className='options';
  opts.forEach(([val,txt])=>{
    const c = document.createElement('button'); c.className='chip'; c.textContent=txt;
    c.onclick = ()=>{ row.remove(); onPick(val, txt); };
    row.appendChild(c);
  });
  chat.appendChild(row); scroll();
}

async function poser(){
  if (idx >= QUESTIONS.length) return finir();
  const q = QUESTIONS[idx];
  await appDit(q.t);
  montrerOptions(q.o, async (val,txt)=>{
    bulle('moi', txt);
    reponses[q.id] = val;
    localStorage.setItem(CLE_STOCK, JSON.stringify(reponses));
    idx++;
    await dodo(250);
    poser();
  });
}

async function finir(){
  await appDit("C’est tout 🎉 Je crée ton profil — tes réponses sont chiffrées avant d’être enregistrées.");
  try{
    const res = await fetch('/profil',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reponses})});
    const d = await res.json();
    if(!res.ok) throw new Error(d.erreur||('Erreur '+res.status));
    localStorage.removeItem(CLE_STOCK);
    await appDit("Voici ton <strong>code à partager</strong> (donne-le à quelqu’un pour voir si vous matchez) :<div class='secret'>"+d.code+"</div>");
    await appDit("Et ta <strong>phrase de récupération</strong> — note-la précieusement, elle sert à retrouver ton profil et ne sera plus jamais affichée :<div class='secret'>"+d.phrase+"</div>", 900);
    await appDit("Voilà, ton profil est prêt 🌸");
  }catch(e){
    await appDit("Aïe, un souci à la création : "+e.message);
    montrerOptions([['retry','Réessayer']], finir);
  }
}

(async ()=>{
  await appDit("Salut 👋 On fait connaissance en quelques questions ?");
  await appDit("Personne d’autre ne verra tes réponses : elles sont chiffrées, et je ne te montrerai qu’une question à la fois.", 900);
  montrerOptions([['go','C’est parti !']], ()=>{ bulle('moi','C’est parti !'); poser(); });
})();
</script>
</body>
</html>
